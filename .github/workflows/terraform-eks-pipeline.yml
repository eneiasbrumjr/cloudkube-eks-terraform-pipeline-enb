name: "Terraform EKS Pipeline"

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-eks-pipeline.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-eks-pipeline.yml'
  workflow_dispatch:

# Prevent concurrent executions of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write  # Required for OIDC authentication

env:
  TF_VERSION: "1.5.0"
  TF_LOG: "INFO"
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  terraform-validate:
    name: "Terraform Validate & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform Format Check"
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: "Terraform Init"
        id: init
        run: terraform init -backend=false

      - name: "Terraform Validate"
        id: validate
        run: terraform validate -no-color

      - name: "Comment PR - Validation Results"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-security-scan:
    name: "Security Scan with tfsec"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Run tfsec"
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true
          format: sarif
          additional_args: --minimum-severity MEDIUM

      - name: "Upload SARIF file"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: [terraform-validate, terraform-security-scan]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # For OIDC authentication, use:
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # role-session-name: GitHubActions-${{ github.run_id }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform Init"
        id: init
        run: terraform init

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: "Save Plan Output"
        if: steps.plan.outcome == 'success'
        run: terraform show -no-color tfplan > plan.txt

      - name: "Comment PR - Plan Results"
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let plan = 'Plan file not found';
            try {
              plan = fs.readFileSync('infra/plan.txt', 'utf8');
            } catch (err) {
              console.log('Error reading plan file:', err);
            }

            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan.slice(0, 65000)}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: "Upload Plan Artifact"
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan
          retention-days: 5

  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: [terraform-validate, terraform-security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://console.aws.amazon.com/eks/
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # For OIDC authentication, use:
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # role-session-name: GitHubActions-${{ github.run_id }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform Init"
        id: init
        run: terraform init

      - name: "Terraform Plan"
        id: plan
        run: terraform plan -no-color

      - name: "Terraform Apply"
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: "Generate Terraform Docs"
        uses: terraform-docs/gh-actions@v1.1.0
        with:
          working-dir: infra
          output-file: ../README.md
          output-method: inject
          git-push: "true"
          git-commit-message: "docs: update Terraform documentation [skip ci]"

  terraform-docs-update:
    name: "Update Terraform Documentation"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: "Generate Terraform Docs"
        uses: terraform-docs/gh-actions@v1.1.0
        with:
          working-dir: infra
          output-file: ../README.md
          output-method: inject
          git-push: "true"
          git-commit-message: "docs: update Terraform documentation"
